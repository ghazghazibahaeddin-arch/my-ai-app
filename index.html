<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        .chat-header { background: #1a1a1a; color: white; padding: 20px; text-align: center; font-size: 1.2em; font-weight: 600; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f0f0; color: #222; border-bottom-left-radius: 2px; }
        .input-area { border-top: 1px solid #eee; padding: 15px; display: flex; gap: 10px; background: white; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; font-size: 14px; }
        button { background: #1a1a1a; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error-banner { color: #d9534f; background: #fdf7f7; font-size: 12px; text-align: center; padding: 5px; display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">AI Chat Assistant</div>
        <div id="status-banner" class="error-banner">Engine Offline. Please check Replit.</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusBanner = document.getElementById('status-banner');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message to UI
            appendMessage('user', text);
            userInput.value = '';
            statusBanner.style.display = 'none';
            
            // Disable button and show loading state
            sendBtn.disabled = true;
            sendBtn.innerText = '...';

            try {
                // Connecting to your Replit URL using the exact format you provided
                const response = await fetch("https://passionate-shabby-fonts--snapwild34.replit.app/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: text })
                });

                if (!response.ok) throw new Error('Network error');

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                appendMessage('ai', aiResponse);
            } catch (error) {
                console.error(error);
                statusBanner.style.display = 'block';
                appendMessage('ai', "Sorry, I couldn't reach the engine. Make sure Replit is running.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Send';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            msgDiv.innerText = content;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
